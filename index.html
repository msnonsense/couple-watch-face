    :root {
      color-scheme: dark;
      --bg: #151515;
      --panel: #222326;
      --panel-2: #2b2d31;
      --text: #f3f3f0;
      --muted: #a8aaa8;
      --line: #3b3d42;
      --accent: #f2c14e;
      --accent-2: #6ac7bd;
      --danger: #ff7a7a;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(320px, 1fr);
      gap: 32px;
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0;
      align-items: start;
    }

    .controls {
      display: grid;
      gap: 18px;
      padding: 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    h1 {
      margin: 0;
      font-size: 1.3rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label,
    legend {
      color: var(--muted);
      font-size: .88rem;
      font-weight: 650;
    }

    textarea,
    input[type="text"],
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #111214;
      color: var(--text);
      padding: 10px 11px;
      outline: none;
    }

    textarea {
      min-height: 118px;
      resize: vertical;
      line-height: 1.35;
    }

    textarea:focus,
    input[type="text"]:focus,
    select:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(106, 199, 189, .16);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    fieldset {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      border: 0;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }

    .segmented label {
      min-width: 0;
      color: var(--text);
      background: #121316;
      border-right: 1px solid var(--line);
      padding: 9px 6px;
      text-align: center;
      cursor: pointer;
      font-size: .84rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .segmented label:last-child {
      border-right: 0;
    }

    .segmented input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segmented label:has(input:checked) {
      background: var(--accent);
      color: #151515;
    }

    .range-line {
      display: grid;
      grid-template-columns: 1fr 44px;
      gap: 10px;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent-2);
    }

    .value {
      color: var(--text);
      font-variant-numeric: tabular-nums;
      text-align: right;
      font-size: .88rem;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding-top: 4px;
    }

    button {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 750;
    }

    .primary {
      background: var(--accent);
      color: #151515;
    }

    .secondary {
      background: var(--panel-2);
      color: var(--text);
      border-color: var(--line);
    }

    .workspace {
      display: grid;
      gap: 18px;
      justify-items: center;
      min-width: 0;
    }

    .watch {
      position: relative;
      width: min(520px, calc(100vw - 32px));
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      background: #242528;
      border-radius: 38px;
      padding: 28px;
    }

    .case {
      position: relative;
      width: 84%;
      aspect-ratio: 1 / 1.16;
      border-radius: 23%;
      background: linear-gradient(135deg, #d8d1c7, #84776b 42%, #eee7dc 58%, #75685f);
      padding: 15px;
      box-shadow: inset 0 0 12px rgba(255,255,255,.48), inset 0 0 32px rgba(0,0,0,.32), 0 18px 40px rgba(0,0,0,.45);
    }

    .case::after {
      content: "";
      position: absolute;
      right: -11px;
      top: 26%;
      width: 18px;
      height: 54px;
      border-radius: 9px;
      background: linear-gradient(90deg, #6b625a, #d8d0c4, #847a70);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.25);
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 19%;
      background: #000;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.06), inset 0 0 24px rgba(255,255,255,.08);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .meta {
      width: min(520px, calc(100vw - 32px));
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.45;
      text-align: center;
    }

    .warn {
      color: var(--danger);
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
        width: min(560px, calc(100vw - 24px));
        padding: 16px 0 24px;
        gap: 18px;
      }

      .controls {
        padding: 16px;
      }

      .watch,
      .meta {
        width: min(500px, calc(100vw - 24px));
      }
    }

    @media (max-width: 430px) {
      .row,
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="controls" aria-label="Watch face controls">
      <h1>Couple Watch Face Generator</h1>

      <div class="field">
        <label for="names">Names and text</label>
        <textarea id="names" spellcheck="false">Name
&
Name
SaysLikeThis</textarea>
      </div>

      <div class="row">
        <div class="field">
          <label for="preset">Watch size</label>
          <select id="preset">
            <option value="square">Square photo face</option>
            <option value="45mm" selected>45/46/49mm screen</option>
            <option value="41mm">40/41/42mm screen</option>
          </select>
        </div>

        <div class="field">
          <label for="font">Font style</label>
          <select id="font">
            <option value="elegant-serif" selected>Elegant serif</option>
            <option value="system-condensed">Big condensed</option>
            <option value="system-bold">Bold rounded</option>
            <option value="system-clean">Clean regular</option>
          </select>
        </div>
      </div>

      <fieldset>
        <legend>Reserve Apple Watch time area</legend>
        <div class="segmented">
          <label><input type="radio" name="time" value="top" checked> Top</label>
          <label><input type="radio" name="time" value="bottom"> Bottom</label>
          <label><input type="radio" name="time" value="none"> None</label>
        </div>
      </fieldset>

      <div class="field">
        <label for="weight">Text thickness</label>
        <div class="range-line">
          <input id="weight" type="range" min="500" max="900" step="50" value="800">
          <span class="value" id="weightValue">800</span>
        </div>
      </div>

      <div class="field">
        <label for="spacing">Line spacing</label>
        <div class="range-line">
          <input id="spacing" type="range" min="82" max="120" step="2" value="94">
          <span class="value" id="spacingValue">94%</span>
        </div>
      </div>

      <div class="field">
        <label for="padding">Edge padding</label>
        <div class="range-line">
          <input id="padding" type="range" min="24" max="150" step="4" value="78">
          <span class="value" id="paddingValue">78</span>
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="download" type="button">Save image</button>
        <button class="secondary" id="copy" type="button">Copy image</button>
      </div>
    </section>

    <section class="workspace" aria-label="Watch face preview">
      <div class="watch">
        <div class="case">
          <div class="screen">
            <canvas id="preview" width="396" height="484"></canvas>
          </div>
        </div>
      </div>
      <p class="meta" id="meta"></p>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('preview');
    const ctx = canvas.getContext('2d');
    const controls = {
      names: document.getElementById('names'),
      preset: document.getElementById('preset'),
      font: document.getElementById('font'),
      weight: document.getElementById('weight'),
      spacing: document.getElementById('spacing'),
      padding: document.getElementById('padding'),
      download: document.getElementById('download'),
      copy: document.getElementById('copy'),
      weightValue: document.getElementById('weightValue'),
      spacingValue: document.getElementById('spacingValue'),
      paddingValue: document.getElementById('paddingValue'),
      meta: document.getElementById('meta')
    };

    const sizes = {
      square: { width: 1200, height: 1200, label: '1200 x 1200 square export' },
      '45mm': { width: 1188, height: 1452, label: '1188 x 1452 high-res export' },
      '41mm': { width: 1056, height: 1290, label: '1056 x 1290 high-res export' }
    };

    function activeTimePosition() {
      return document.querySelector('input[name="time"]:checked').value;
    }

    function fontFamily() {
      if (controls.font.value === 'elegant-serif') {
        return '"Merriweather", Georgia, "Times New Roman", serif';
      }
      if (controls.font.value === 'system-bold') {
        return '"Arial Rounded MT Bold", "SF Pro Rounded", Arial, sans-serif';
      }
      if (controls.font.value === 'system-clean') {
        return 'Inter, "SF Pro Display", Arial, sans-serif';
      }
      return '"Arial Narrow", "Roboto Condensed", "SF Pro Condensed", "Helvetica Neue", Arial, sans-serif';
    }

    function usableRect(width, height) {
      const pad = Number(controls.padding.value);
      const time = activeTimePosition();
      const reserve = Math.round(height * 0.26);
      const rect = {
        x: pad,
        y: pad,
        width: width - pad * 2,
        height: height - pad * 2
      };

      if (time === 'top') {
        rect.y += reserve;
        rect.height -= reserve;
      } else if (time === 'bottom') {
        rect.height -= reserve;
      }

      return rect;
    }

    function setFont(size) {
      ctx.font = `${controls.weight.value} ${size}px ${fontFamily()}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
    }

    function fitText(lines, rect) {
      const lineGap = Number(controls.spacing.value) / 100;
      let low = 8;
      let high = Math.min(rect.height / Math.max(lines.length, 1), rect.width) * 1.4;

      for (let i = 0; i < 34; i += 1) {
        const size = (low + high) / 2;
        setFont(size);
        const lineHeight = size * lineGap;
        const totalHeight = lineHeight * Math.max(lines.length - 1, 0) + size;
        const widest = Math.max(...lines.map(line => ctx.measureText(line).width));

        if (widest <= rect.width && totalHeight <= rect.height) {
          low = size;
        } else {
          high = size;
        }
      }

      return low;
    }

    function roundedRectPath(context, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      context.beginPath();
      context.moveTo(x + r, y);
      context.arcTo(x + width, y, x + width, y + height, r);
      context.arcTo(x + width, y + height, x, y + height, r);
      context.arcTo(x, y + height, x, y, r);
      context.arcTo(x, y, x + width, y, r);
      context.closePath();
    }

    function render() {
      const preset = sizes[controls.preset.value];
      canvas.width = preset.width;
      canvas.height = preset.height;

      const width = canvas.width;
      const height = canvas.height;
      const lines = controls.names.value
        .split(/\n/)
        .map(line => line.trim())
        .filter(Boolean);
      const textLines = lines.length ? lines : ['Couple Names'];
      const rect = usableRect(width, height);
      const radius = controls.preset.value === 'square' ? 92 : Math.round(width * 0.16);

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      roundedRectPath(ctx, 0, 0, width, height, radius);
      ctx.clip();

      ctx.fillStyle = '#050505';
      ctx.fillRect(0, 0, width, height);

      const fontSize = fitText(textLines, rect);
      setFont(fontSize);

      ctx.shadowColor = 'rgba(255,255,255,.28)';
      ctx.shadowBlur = Math.max(2, fontSize * 0.035);
      ctx.fillStyle = '#f6f6ef';

      const lineHeight = fontSize * (Number(controls.spacing.value) / 100);
      const totalHeight = lineHeight * Math.max(textLines.length - 1, 0);
      const centerY = rect.y + rect.height / 2;
      const startY = centerY - totalHeight / 2;

      textLines.forEach((line, index) => {
        ctx.fillText(line, rect.x + rect.width / 2, startY + index * lineHeight);
      });

      if (activeTimePosition() !== 'none') {
        const guideHeight = Math.round(height * 0.22);
        const guideY = activeTimePosition() === 'top' ? 0 : height - guideHeight;
        const gradient = ctx.createLinearGradient(0, guideY, 0, guideY + guideHeight);
        gradient.addColorStop(0, 'rgba(0,0,0,.40)');
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = activeTimePosition() === 'top' ? gradient : 'rgba(0,0,0,.22)';
        ctx.fillRect(0, guideY, width, guideHeight);
      }

      ctx.restore();

      controls.weightValue.textContent = controls.weight.value;
      controls.spacingValue.textContent = `${controls.spacing.value}%`;
      controls.paddingValue.textContent = controls.padding.value;
      controls.meta.textContent = `${preset.label}. Auto-fit size: ${Math.round(fontSize)}px.`;
    }

    function filename() {
      const slug = controls.names.value
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 5)
        .join('-')
        .replace(/[^a-z0-9-]/gi, '')
        .toLowerCase();
      return `${slug || 'couple'}-watch-face.png`;
    }

    async function saveImage() {
      render();
      const name = filename();
      const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      if (!blob) return;
      const file = new File([blob], name, { type: 'image/png' });

      // iPhone / iPad: the system share sheet is the reliable way to get the
      // PNG into Photos or Files. "Save Image" there saves straight to Photos.
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: 'Watch Face' });
          controls.meta.textContent = 'Shared. Choose "Save Image" to add it to Photos.';
          return;
        } catch (err) {
          if (err && err.name === 'AbortError') return; // user closed the sheet
          // otherwise fall through to a normal download
        }
      }

      // Desktop browsers: trigger a normal file download.
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = name;
      link.href = url;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    controls.download.addEventListener('click', saveImage);

    controls.copy.addEventListener('click', async () => {
      render();
      if (!navigator.clipboard || !window.ClipboardItem) {
        controls.meta.innerHTML = '<span class="warn">Copy is unavailable in this browser. Use Download PNG.</span>';
        return;
      }

      canvas.toBlob(async blob => {
        try {
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          controls.meta.textContent = 'Copied image to clipboard.';
        } catch {
          controls.meta.innerHTML = '<span class="warn">Copy was blocked by the browser. Use Download PNG.</span>';
        }
      }, 'image/png');
    });

    document.querySelectorAll('input, textarea, select').forEach(input => {
      input.addEventListener('input', render);
      input.addEventListener('change', render);
    });

    render();

    // Canvas text does not trigger web-font loading on its own, so load the
    // elegant serif explicitly and repaint once it is ready.
    if (document.fonts && document.fonts.load) {
      document.fonts.load('800 100px "Merriweather"').then(render).catch(() => {});
    }

    // Register the offline service worker when served over http(s). This is what
    // lets the installed app open and work with no internet. It is skipped when
    // the page is opened as a local file:// (where everything already works
    // offline because the font is embedded).
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
